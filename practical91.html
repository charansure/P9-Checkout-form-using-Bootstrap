<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <link href="bootstrap-5.3.8-dist/css/bootstrap.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container-fluid">
    <div class="row vh-100">
        <div class="col-md-6 bg-success text-white d-flex flex-column justify-content-between p-5">
            <div>
                <a href="practical9.html" class="btn btn-light btn-sm mb-3">← Back</a>
                <h4 class="fw-bold">DevX</h4>
                <p class="mt-3">Subscribe to Devx Tool Subcription</p>
                <h2 class="fw-bold">₹30,000.00 <small class="fs-6">per week</small></h2>
            </div>
            <div class="small">Powered by <strong>Charan</strong> | Terms | Privacy</div>
        </div>
        <div class="col-md-6 bg-white p-5 d-flex align-items-center">
            <div class="w-100">
                <div class="d-flex gap-2 mb-3">
                    <button class="btn btn-dark w-50">Interlink Pay</button>
                    <button class="btn btn-success w-50">Pay with link</button>
                </div>
                <p class="text-center text-muted">Or pay another way</p>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Card information</label>
                        <input type="text" class="form-control mb-2" placeholder="1234 1234 1234 1234">
                        <div class="row">
                            <div class="col">
                                <input type="text" class="form-control" placeholder="MM/YY">
                            </div>
                            <div class="col">
                                <input type="text" class="form-control" placeholder="CVC">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Name on card</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Country or region</label>
                        <select class="form-select">
                            <option>India</option>
                            <option>USA</option>
                            <option>UK</option>
                        </select>
                    </div>
                    <button class="btn btn-success w-100 mt-3">Subscribe</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
