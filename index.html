<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Details</title>
    <link href="bootstrap-5.3.8-dist/css/bootstrap.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card p-4 w-100">
        <h4 class="text-center">Enter Details</h4>
        <form action="practical91.html">
            <div>
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="tel" class="form-control" placeholder="+91 9876543210" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Continue</button>
        </form>
    </div>
</div>
</body>
</html>
